<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flames JB</title>
</head>
<body style="margin: 0; padding: 0; background-color: #f5f5f5; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;">

    <div style="max-width: 600px; margin: 30px auto;">

        <!-- HEADER -->
        <div style="background-color: #1a1a1a; padding: 24px 40px; border-radius: 10px 10px 0 0; text-align: center;">
            <h1 style="margin: 0; color: #e25822; font-size: 28px; letter-spacing: 2px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;">
                🔥 Flames JB
            </h1>
            <p style="margin: 6px 0 0 0; color: #aaaaaa; font-size: 12px; font-style: italic;">
                Av. San Juan 1234, Boedo · Buenos Aires
            </p>
        </div>

        <!-- CONTENIDO -->
        <div style="background-color: #ffffff; padding: 36px 40px; border-left: 1px solid #e0e0e0; border-right: 1px solid #e0e0e0;">
            {% block contenido %}{% endblock %}
        </div>

        <!-- FOOTER -->
        <div style="background-color: #36543f; padding: 18px 40px; border-radius: 0 0 10px 10px; text-align: center;">
            <p style="margin: 0; color: #c8dfc8; font-size: 12px;">
                📞 +54 9 11 3435-6787 &nbsp;·&nbsp; flamesjbresto@gmail.com
            </p>
            <p style="margin: 6px 0 0 0; color: #a0c0a0; font-size: 11px; font-style: italic;">
                © Flames JB · Todos los derechos reservados
            </p>
        </div>

    </div>

</body>
</html>
