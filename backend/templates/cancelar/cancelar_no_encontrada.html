<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reserva no encontrada · Flames JB</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #f5f5f5;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .caja {
            background-color: #ffffff;
            border-radius: 10px;
            padding: 48px 40px;
            text-align: center;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
        }
        .icono { font-size: 56px; margin-bottom: 16px; }
        h2 { color: rgb(54, 84, 63); font-size: 28px; margin-bottom: 12px; }
        p { color: rgb(79, 79, 79); font-size: 16px; font-style: italic; margin-bottom: 28px; line-height: 1.5; }
        .boton {
            display: inline-block;
            background-color: #c0392b;
            color: white;
            padding: 12px 30px;
            text-decoration: none;
            border-radius: 30px;
            font-size: 16px;
            font-weight: bold;
        }
        .boton:hover { background-color: #a93226; }
    </style>
</head>
<body>
    <div class="caja">
        <div class="icono">❌</div>
        <h2>Reserva no encontrada</h2>
        <p>No encontramos ninguna reserva asociada a este link.</p>
        <a href="http://127.0.0.1:5000" class="boton">Volver al inicio</a>
    </div>
</body>
</html>
