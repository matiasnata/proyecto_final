{% extends 'login.html' %}

{% block estilos %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/errores.css') }}">
{% endblock %}

{% block contenedor %}
<div class="login-header">
    <img src="{{ url_for('static', filename='Imagenes/fondo.jpg') }}" alt="Logo Flames" class="login-logo">
    <h1>Flames JB Admin</h1>
</div>
<section class="error-container">
    <div class="caja-error">
        <h1 class="codigo-404">404</h1>
        <h2>¡Uy! Página no encontrada</h2>
        <p>Lo sentimos, la página que estás intentando buscar no existe, fue eliminada o movida a otra ruta.</p>

        <a href="{{ url_for('inicio.inicio') }}" class="btn-volver-error verde">Volver al inicio</a>
    </div>
</section>
{% endblock %}
