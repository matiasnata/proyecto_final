<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../static/css/admin.css">
    <title>Savoria admin</title>
</head>
<body class="admin-layout">
    <aside class="sidebar">
        <div class="sidebar-header">
            <img src="../static/Imagenes/fondo.jpg"
            alt="Logo Savoria"
            class="sidebar-logo">

            <span class="sidebar-title">
                Flames JB
            </span>
        </div>
    <nav class="links_dashboard">
        <ul>

            <li>
                <a href="{{ url_for('admin_dashboard') }}">
                    <img src="/static/Imagenes/dashboard.png"
                         alt=""
                        class="nav-icon">

                    Panel de Control
                </a>
            </li>

            <li>
                <a href="{{ url_for('admin_menu') }}">
                    <img src="/static/Imagenes/menu.png"
                        alt=""
                        class="nav-icon">

                    Gestión del Menú
                </a>
            </li>

            <li>
                <a href="{{ url_for('admin_resenas') }}">
                    <img src="/static/Imagenes/star.png"
                        alt=""
                        class="nav-icon">

                    Reseñas
                </a>
            </li>
            <li>
                <a href="{{ url_for('admin_servicios') }}">
                    <img src="/static/Imagenes/servicios.png"
                         alt=""
                         class="nav-icon">
                    Servicios
                </a>
            </li>

            <li>
                <a href="{{ url_for('admin_reservas') }}">
                    <img src="/static/Imagenes/reservas.png"
                        alt=""
                        class="nav-icon">
                    Reservas
                </a>
            </li>

            <li>
                <a href="{{ url_for('admin_estadisticas') }}">
                    <img src="/static/Imagenes/estadisticas.png"
                         alt=""
                         class="nav-icon">
                    Estadísticas
                </a>
            </li>

        </ul>

    </nav>
        <div class="sidebar-footer">
            <a href="{{ url_for('inicio') }}">Volver a la Web</a>
        </div>
    </aside>

    <main class="main-content">
        <header class="topbar">
            <h1>{% block titulo_seccion %}{% endblock %}</h1> <!--aca ponen el titulo de su seccion-->
            <div class="user-profile">
                <span class="admin-avatar">{{ usuario_autenticado[0] | upper }}</span> <!--habria que ver luego cuando manejemos el inicio de sesion que s eguarde en alguna variable usuario, el nombre del usuario que inici sesion asi aparece su incial ahi arriba-->
            </div>
        </header>

        <div class="page-content">
            {% block admin_content %}{% endblock %} <!--aca el contenido de su seccion-->
        </div>
    </main>
    
</body>
</html>
